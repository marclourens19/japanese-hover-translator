[tool.ruff]
line-length = 100
target-version = "py39"
exclude = ["build", "dist", ".venv"]

[tool.ruff.lint]
# E/W  -- pycodestyle style checks (includes E501 line-length, enforced at 100)
# F    -- pyflakes (unused imports/variables, undefined names, real bugs)
# I    -- isort-style import ordering
select = ["E", "W", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# study_app.py's StudyApp class is retained for source-history reference only
# (its __init__ raises immediately -- see the class docstring) and imports
# names its dead body still refers to.
"src/study_app.py" = ["F401"]

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
files = ["src"]
warn_unused_ignores = true
warn_redundant_casts = true

# These libraries have no type stubs and no py.typed marker on PyPI --
# pyperclip and pynput are checked for real via the types-pyperclip/
# types-pynput packages in requirements-dev.txt; mss, sentencepiece, and
# winrt.* all ship their own py.typed marker and need no override at all.
[[tool.mypy.overrides]]
module = ["ctranslate2", "deep_translator", "deep_translator.google", "fugashi", "pytesseract"]
ignore_missing_imports = true
